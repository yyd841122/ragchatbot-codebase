name: Zhipu AI Issue Handler

on:
  issues:
    types: [opened, reopened, labeled, edited]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: false
        type: number
        default: 1

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  zhipu-issue-handler:
    runs-on: ubuntu-latest
    # 简化触发条件，只在有claude-auto标签时运行
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        contains(github.event.issue.labels.*.name, 'claude-auto')
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install zhipuai==1.0.0 PyGithub>=2.3.0

      - name: Verify Python packages
        run: |
          python -c "import sys; print(f'Python: {sys.version}')"
          python -c "import zhipuai; print(f'✅ zhipuai {zhipuai.__version__}')"
          python -c "import github; print(f'✅ PyGithub {github.__version__}')"

      - name: Debug environment
        run: |
          echo "=== GitHub Event Debug ==="
          echo "Event name: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Actor: ${{ github.actor }}"
          echo "Issue number: ${{ github.event.issue.number }}"
          echo "Issue labels: ${{ github.event.issue.labels.*.name }}"
          echo "Has claude-auto label: ${{ contains(github.event.issue.labels.*.name, 'claude-auto') }}"
          echo "Workflow dispatch issue: ${{ github.event.inputs.issue_number }}"

      - name: Run Zhipu AI Handler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          PYTHONUNBUFFERED: '1'
        run: |
          python .github/scripts/claude_issue_handler_simple.py
