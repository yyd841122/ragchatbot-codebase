name: Zhipu AI Issue Handler

on:
  issues:
    types: [opened, reopened, labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  zhipu-issue-handler:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'claude-auto')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel

      - name: Install Python dependencies
        run: |
          pip install zhipuai==1.0.0 PyGithub>=2.3.0 python-dotenv>=1.0.0

      - name: Verify installation
        run: |
          python -c "import zhipuai; print('✅ zhipuai installed')"
          python -c "import github; print('✅ PyGithub installed')"
          python -c "import dotenv; print('✅ python-dotenv installed')"

      - name: Process Issue with Zhipu AI
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          REPO_NAME: ${{ github.repository }}
          PYTHONUNBUFFERED: '1'
        run: |
          python .github/scripts/claude_issue_handler.py