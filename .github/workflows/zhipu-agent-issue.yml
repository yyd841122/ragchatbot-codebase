name: Zhipu Issue Agent

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  issue-agent:
    # 只处理 Issue 评论，不处理 PR 评论
    if: >
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '@zhipu')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/requirements-agent.txt

      - name: Verify installation
        run: |
          python -c "import zhipuai; print('✅ zhipuai installed')"
          python -c "import github; print('✅ PyGithub installed')"
          python -c "import sniffio; print('✅ sniffio installed')"

      - name: Run Issue Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: python .github/scripts/agent_issue_handler.py
